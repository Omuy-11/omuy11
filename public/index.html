<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 style="text-align:center;">🍜 Order Makanan</h1>
<p style="text-align:center; color:#666;">Pilih menu favorit kamu</p>

<!-- MENU -->
<div class="menu">

  <div class="card">
    <img src="https://source.unsplash.com/300x300/?noodle">
    <h3>Mie Jebew Porsi Normal</h3>
    <p>Rp 7.000</p>
    <p id="stokNormal">Stok: ...</p>
    <button id="btn-normal" onclick="tambah('Mie Jebew Porsi Normal',7000)">Tambah</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x300/?spicy-noodle&sig=2">
    <h3>Mie Jebew Porsi Mini</h3>
    <p>Rp 5.000</p>
    <p id="stokMini">Stok: ...</p>
    <button id="btn-mini" onclick="tambah('Mie Jebew Porsi Mini',5000)">Tambah</button>
  </div>

</div>

<!-- KERANJANG -->
<h2>🛒 Keranjang</h2>
<ul id="keranjang"></ul>

<p class="total">Total: <b id="total">Rp 0</b></p>

<!-- FORM -->
<input id="nama" placeholder="Nama">

<select id="alamat">
  <option value="">Pilih alamat</option>
  <option value="Pacet" data-ongkir="1000">Pacet - Rp 1.000</option>
  <option value="Majalaya" data-ongkir="2000">Majalaya - Rp 2.000</option>
</select>

<div id="alamatLengkapBox" class="alamat-box" style="display:none;">
  <textarea id="alamatLengkap" placeholder="Desa, RT, RW, No Rumah, Patokan"></textarea>
  <input id="telp" placeholder="No Telepon (WA aktif)">
  <small>Wajib isi alamat lengkap</small>
</div>

<select id="pembayaran">
  <option value="">Pembayaran</option>
  <option value="COD">COD</option>
</select>

<!-- STATUS -->
<div id="statusBox"></div>

<!-- BUTTON PESAN -->
<div class="footer">
  <button onclick="checkout()">Pesan Sekarang</button>

  <button onclick="window.open('antrian.html', '_blank')" style="background:#0ea5e9; margin-top:10px;">
    📺 Lihat Antrian
  </button>
</div>

<script src="script.js"></script>
</body>
</html>

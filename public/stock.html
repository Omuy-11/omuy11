<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Stock</title>
<link rel="stylesheet" href="style.css">

<style>
/* 🔥 BONUS BIAR LEBIH JELAS */
.stok-habis { color: red; font-weight: bold; }
.stok-sedikit { color: orange; font-weight: bold; }
.stok-banyak { color: green; font-weight: bold; }
</style>

</head>

<body onload="cekLogin(); loadStock();">

<div class="container">

<button onclick="window.location='menu.html'" style="background:#64748b;">
  ⬅️ Kembali
</button>

<h2>📦 Manajemen Stock</h2>

<input id="namaStock" placeholder="Nama Barang">
<input id="jumlahStock" type="number" placeholder="Jumlah">

<button onclick="tambahStock()">Tambah Stock</button>

<div id="listStock"></div>

</div>

<script src="script.js"></script>

<script>

const token = localStorage.getItem("token");

/* ================= LOAD ================= */
function loadStock() {
  fetch(BASE_URL + "/stocks")
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("listStock");
      container.innerHTML = "";

      if (!data || data.length === 0) {
        container.innerHTML = "<p>Belum ada stock</p>";
        return;
      }

      data.forEach(s => {

        const div = document.createElement("div");
        div.className = "card";

        // 🔥 WARNA DINAMIS
        let warna = "stok-banyak";
        let text = "Stok: " + s.jumlah;

        if (s.jumlah <= 0) {
          warna = "stok-habis";
          text = "❌ HABIS";
        } else if (s.jumlah <= 3) {
          warna = "stok-sedikit";
          text = "⚠️ Sisa " + s.jumlah;
        }

        div.innerHTML = `
          <b>${escapeHTML(s.nama)}</b><br>
          <span class="${warna}">${text}</span><br><br>

          <div style="display:flex; gap:5px;">
            <button onclick="updateStock('${s.nama}', 1)">➕</button>
            <button onclick="updateStock('${s.nama}', -1)">➖</button>
          </div>

          <br>
          <button onclick="hapusStock(${s.id})" style="background:red;">Hapus</button>
        `;

        container.appendChild(div);
      });

    });
}

/* ================= TAMBAH ================= */
function tambahStock() {
  const nama = document.getElementById("namaStock").value.trim();
  const jumlah = parseInt(document.getElementById("jumlahStock").value);

  if (!nama || isNaN(jumlah) || jumlah <= 0) {
    alert("Nama & jumlah harus valid!");
    return;
  }

  const token = localStorage.getItem("token");

fetch(BASE_URL + "/stocks", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
  },
  body: JSON.stringify({ nama, jumlah })
})
  .then(() => {
    document.getElementById("namaStock").value = "";
    document.getElementById("jumlahStock").value = "";
    loadStock();
  });
}

/* ================= HAPUS ================= */
function hapusStock(id) {
  const token = localStorage.getItem("token");

  fetch(BASE_URL + "/stocks/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(() => loadStock());
}

/* ================= UPDATE ================= */

  // 🔥 CEK BIAR GAK MINUS
  if (jumlah < 0) {
    const confirmMinus = confirm("Kurangi stok?");
    if (!confirmMinus) return;
  }
}

/* ================= SECURITY ================= */

// 🔥 ANTI HTML INJECTION
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#039;"
    })[m];
  });
}

</script>

</body>
</html>

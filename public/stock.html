<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Stock</title>
<link rel="stylesheet" href="style.css">

<style>
.stok-banyak { color: #22c55e; font-weight: bold; }
.stok-sedikit { color: #f59e0b; font-weight: bold; }
.stok-habis { color: #ef4444; font-weight: bold; }
</style>
</head>

<body onload="loadStock()">

<div class="container">

<button onclick="window.location='menu.html'" style="background:#64748b; margin-bottom:10px;">
  ⬅️ Kembali
</button>

<h2>📦 Manajemen Stock</h2>

<div id="listStock"></div>

</div>

<script>

const BASE_URL = "https://omuy11-production.up.railway.app";

function loadStock() {
  fetch(BASE_URL + "/stocks")
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("listStock");
      if (!container) return;

      container.innerHTML = "";

      if (!data || data.length === 0) {
        container.innerHTML = "<p>Belum ada stock</p>";
        return;
      }

      data.forEach(s => {

        let warna = "stok-banyak";
        let text = "Stok: " + s.jumlah;

        if (s.jumlah <= 0) {
          warna = "stok-habis";
          text = "❌ HABIS";
        } else if (s.jumlah <= 3) {
          warna = "stok-sedikit";
          text = "⚠️ Sisa " + s.jumlah;
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${s.nama}</b><br>
          <span class="${warna}">${text}</span><br><br>

          <div style="display:flex; gap:5px;">
            <button onclick="updateStock('${s.nama}', 1)">➕</button>
            <button onclick="updateStock('${s.nama}', -1)">➖</button>
          </div>

          <br>
          <button onclick="hapusStock(${s.id})" style="background:red;">Hapus</button>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => console.error(err));
}

function updateStock(nama, jumlah) {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Harus login dulu!");
    window.location = "login.html";
    return;
  }

  fetch(BASE_URL + "/stocks/update", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ nama, jumlah })
  })
  .then(() => loadStock());
}

function hapusStock(id) {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Harus login dulu!");
    window.location = "login.html";
    return;
  }

  fetch(BASE_URL + "/stocks/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(() => loadStock());
}

</script>

</body>
</html>
